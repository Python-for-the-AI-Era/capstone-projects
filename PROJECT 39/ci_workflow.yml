jobs:
  test:
    strategy:
      matrix:
        platform: [ubuntu-latest, macos-latest] # Multi-platform testing
        python-version: ["3.10", "3.11"]
    
    steps:
      - uses: actions/checkout@v3
      - name: Install dependencies
        run: pip install .
      
      # TASK 4: The Smoke Test (Fail Fast)
      - name: Scrapy Smoke Test
        run: scrapy check stanbic_spider